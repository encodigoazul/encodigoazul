<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Salud Latina</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8; /* 👈 color claro como antes */
    color: #111;
    text-align: center;
    margin: 0;
    padding: 0;
}

.container {
    padding: 15px 10px; /* 👈 menos espacio */
}

h1 {
    font-weight: 400;
    margin-bottom: 10px;
}

.player {
    margin: 10px 0; /* 👈 más compacto */
}

.oyentes {
    font-size: 12px;
    font-weight: 300;
    color: #555;
    margin-top: 5px;
}

audio {
    width: 85%;
    max-width: 420px;
}

iframe {
    margin-top: 10px; /* 👈 sube el podcast */
    border-radius: 12px;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #666;
    opacity: 0.8;
}
</style>

</head>

<body>

<div class="container">

    <h1>🎧 Radio Salud Latina</h1>

    <!-- PLAYER -->
    <div class="player">
        <audio controls autoplay>
            <source src="https://cast6.asurahosting.com/proxy/radio_salud_latina/stream" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>

        <!-- OYENTES -->
        <div class="oyentes" id="oyentes">
            🇨🇱 0 oyentes · 🌎 0 oyentes
        </div>
    </div>

    <!-- PODCAST -->
    <iframe 
        src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l" 
        width="85%" height="152" frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

    <!-- FOOTER -->
    <div class="footer">
        En Código Azul® 2026 – Jorge Luis Vergara Salas
    </div>

</div>

<script>

// 🔥 INICIO ALEATORIO
let chile = Math.floor(Math.random() * 12) + 4;
let global = Math.floor(Math.random() * 10) + 3;

// 🕐 AJUSTE HORARIO
function ajustePorHora() {
    let hora = new Date().getHours();

    if (hora >= 6 && hora < 12) {
        chile += 1.5;
        global += 2.5;
    } else if (hora >= 12 && hora < 18) {
        chile += 2.5;
        global += 3;
    } else if (hora >= 18 && hora < 23) {
        chile += 3.5;
        global += 4;
    } else {
        chile -= 1.5;
        global += 3.5;
    }
}

// 🔄 ACTUALIZAR TEXTO
function actualizarTexto() {
    document.getElementById("oyentes").innerHTML =
        "🇨🇱 " + Math.floor(chile) + " oyentes · 🌎 " + Math.floor(global) + " oyentes";
}

// 🔁 VARIACIÓN SUAVE
function variacionSuave() {
    chile += (Math.random() - 0.5) * 1.5;
    global += (Math.random() - 0.5) * 1.5;

    if (chile < 3) chile = 3;
    if (global < 2) global = 2;

    actualizarTexto();
}

// 🚀 CAMBIO MÁS FUERTE
function cambioFuerte() {
    ajustePorHora();

    chile += Math.floor(Math.random() * 7) - 3;
    global += Math.floor(Math.random() * 7) - 3;

    if (chile < 3) chile = 3;
    if (global < 2) global = 2;

    actualizarTexto();
}

// INICIO
actualizarTexto();
setInterval(variacionSuave, 15000);
setInterval(cambioFuerte, 90000);

</script>

</body>
</html>
