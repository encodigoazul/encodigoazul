<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Radio Salud Latina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    p {
      color: #cbd5f5;
    }

    .player {
      margin: 30px auto;
      padding: 20px;
      background: #020617;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    audio {
      width: 100%;
      margin-top: 15px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #22c55e;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #16a34a;
    }

    .section {
      margin: 50px 20px;
    }

    iframe {
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      height: 152px;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 0.9em;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    <h1>📻 Radio Salud Latina</h1>
    <p>Temas de salud en lenguaje claro</p>
  </header>

  <!-- RADIO EN VIVO -->
  <div class="player">
    <h2>🔴 En Vivo</h2>

    <audio controls autoplay>
      <source src="https://cast6.asurahosting.com/proxy/radio_salud_latina/stream" type="audio/mpeg">
      Tu navegador no soporta audio.
    </audio>

    <a class="btn" href="https://cast6.asurahosting.com/proxy/radio_salud_latina/stream" target="_blank">
      ▶ Escuchar en otra pestaña
    </a>
  </div>

  <!-- PODCAST -->
  <div class="section">
    <h2>🎙️ Podcast</h2>
    <p>Escucha nuestros episodios</p>

    <!-- REEMPLAZA ESTE LINK POR TU SPOTIFY -->
    <iframe src="https://open.spotify.com/embed/show/TU_PODCAST_ID" 
            frameborder="0" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <footer>
    © 2026 Radio Salud Latina
  </footer>

</body>
</html>
