<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>En Código Azul</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0B1C2C, #132F4C);
      color: white;
      text-align: center;
    }

    header {
      padding: 25px;
      font-size: 30px;
      font-weight: bold;
      background: #00AEEF;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 30px;
    }

    iframe {
      border-radius: 12px;
      margin-top: 15px;
    }

    h2 {
      margin-bottom: 10px;
    }

    /* BOTÓN FLOTANTE */
    .floating-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #00AEEF;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-size: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .floating-btn:hover {
      background: #008FCC;
    }

    /* PANEL RADIO */
    .radio-panel {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 320px;
      background: #132F4C;
      border-radius: 16px;
      padding: 15px;
      display: none;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .live {
      color: #7CFFB2;
      font-weight: bold;
      margin-bottom: 10px;
    }

    footer {
      margin-top: 40px;
      padding: 15px;
      background: #08131F;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  🎙️ En Código Azul
</header>

<div class="container">

  <!-- PODCAST -->
  <div class="card">
    <h2>🎧 Podcast en Spotify</h2>

    <iframe 
      src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l"
      width="100%" 
      height="352"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

    <p style="font-size:14px; opacity:0.8;">
      Escucha todos los episodios directamente desde Spotify
    </p>
  </div>

</div>

<!-- BOTÓN FLOTANTE -->
<div class="floating-btn" onclick="toggleRadio()">
  ▶️
</div>

<!-- RADIO (SOLUCIÓN MÁS ESTABLE) -->
<div class="radio-panel" id="radioPanel">

  <div class="live">🔴 EN VIVO</div>

  <iframe 
    src="http://cast6.my-control-panel.com:9253/index.html?sid=1"
    width="100%" 
    height="120"
    frameborder="0">
  </iframe>

</div>

<footer>
  © 2026 En Código Azul
</footer>

<script>
function toggleRadio() {
  const panel = document.getElementById("radioPanel");
  panel.style.display = (panel.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
