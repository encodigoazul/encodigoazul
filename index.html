<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>En Código Azul</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0B1C2C, #132F4C);
  color: white;
  text-align: center;
}

header {
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  background: #00AEEF;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 25px;
}

audio {
  width: 100%;
  margin-top: 10px;
}

.song {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
}

.history {
  text-align: left;
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}

.bar {
  display: inline-block;
  width: 5px;
  height: 20px;
  margin: 2px;
  background: #1DB954;
  animation: bounce 1s infinite ease-in-out;
}

.bar:nth-child(2){ animation-delay: 0.2s;}
.bar:nth-child(3){ animation-delay: 0.4s;}
.bar:nth-child(4){ animation-delay: 0.6s;}
.bar:nth-child(5){ animation-delay: 0.8s;}

@keyframes bounce {
  0%,100% {height: 10px;}
  50% {height: 30px;}
}

iframe {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 20px;
}

.social a {
  margin: 5px;
  color: #00AEEF;
  text-decoration: none;
}

footer {
  padding: 15px;
  background: #08131F;
  font-size: 12px;
}
</style>
</head>

<body>

<header>🎙️ En Código Azul</header>

<div class="container">

<!-- RADIO -->
<div class="card">
<h2>📻 En Vivo</h2>

<div>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</div>

<audio controls autoplay>
  <source src="http://cast6.my-control-panel.com:9253/;stream.mp3" type="audio/mpeg">
</audio>

<div class="song" id="song">Cargando...</div>

<div class="history" id="history">
<strong>Últimas canciones:</strong>
<ul id="historyList"></ul>
</div>

</div>

<!-- PODCAST -->
<div class="card">
<h2>🎧 Podcast</h2>

<iframe 
src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l"
height="352"
frameborder="0"
allow="autoplay; encrypted-media">
</iframe>

</div>

<!-- CONTACTO -->
<div class="card">
<h2>📲 Contáctanos</h2>

<a class="btn" href="https://wa.me/56977990671" target="_blank">
Escríbenos por WhatsApp
</a>

<div class="social">
<p>Síguenos:</p>
<a href="#">Facebook</a> |
<a href="#">Instagram</a> |
<a href="#">Twitter</a>
</div>

</div>

</div>

<footer>© 2026 En Código Azul Jorge Luis Vergara Salas</footer>

<script>
const url = "http://cast6.my-control-panel.com:9253/currentsong?sid=1";

let historial = [];

async function actualizar() {
  try {
    const res = await fetch(url);
    const texto = await res.text();

    document.getElementById("song").innerText = texto;

    if (!historial.includes(texto)) {
      historial.unshift(texto);
      if (historial.length > 5) historial.pop();

      const lista = document.getElementById("historyList");
      lista.innerHTML = "";

      historial.forEach(c => {
        let li = document.createElement("li");
        li.innerText = c;
        lista.appendChild(li);
      });
    }

  } catch {
    document.getElementById("song").innerText = "🎵 Radio en vivo";
  }
}

setInterval(actualizar, 15000);
actualizar();
</script>

</body>
</html>
