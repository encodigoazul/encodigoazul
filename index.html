<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio Salud Latina</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #0d1117;
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

.container {
    padding: 20px;
}

h1 {
    font-weight: normal;
}

.player {
    margin: 20px 0;
}

.oyentes {
    font-size: 13px;
    font-weight: 300;
    color: #c9d1d9;
    margin-top: 10px;
}

audio {
    width: 80%;
    max-width: 400px;
}

iframe {
    margin-top: 20px;
    border-radius: 12px;
}
</style>

</head>

<body>

<div class="container">

    <h1>🎧 Radio Salud Latina</h1>

    <!-- PLAYER -->
    <div class="player">
        <audio controls autoplay>
            <source src="https://cast6.asurahosting.com/proxy/radio_salud_latina/stream" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>

        <!-- OYENTES -->
        <div class="oyentes" id="oyentes">
            🇨🇱 0 oyentes · 🌎 0 oyentes
        </div>
    </div>

    <!-- PODCAST SPOTIFY -->
    <iframe style="border-radius:12px" 
        src="https://open.spotify.com/embed/show/XXXXXXXXXXXX" 
        width="80%" height="152" frameBorder="0" 
        allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

</div>

<script>

// 🔥 VALORES INICIALES ALEATORIOS (para que no se repita)
let chile = Math.floor(Math.random() * 10) + 5;
let global = Math.floor(Math.random() * 8) + 3;

// 🕐 FUNCIÓN SEGÚN HORA (comportamiento realista)
function ajustePorHora() {
    let hora = new Date().getHours();

    if (hora >= 6 && hora < 12) {
        chile += 2;
        global += 3;
    } else if (hora >= 12 && hora < 18) {
        chile += 3;
        global += 4;
    } else if (hora >= 18 && hora < 23) {
        chile += 4;
        global += 5;
    } else {
        chile -= 2;
        global += 3; // más audiencia internacional en la noche
    }
}

// 🔄 ACTUALIZAR TEXTO
function actualizarTexto() {
    document.getElementById("oyentes").innerHTML =
        "🇨🇱 " + Math.floor(chile) + " oyentes · 🌎 " + Math.floor(global) + " oyentes";
}

// 🔁 VARIACIÓN SUAVE (cada 20 segundos)
function variacionSuave() {
    chile += (Math.random() - 0.5) * 2;
    global += (Math.random() - 0.5) * 2;

    // límites mínimos
    if (chile < 3) chile = 3;
    if (global < 2) global = 2;

    actualizarTexto();
}

// 🚀 CAMBIO MÁS NOTORIO (cada 2 minutos)
function cambioFuerte() {
    ajustePorHora();

    chile += Math.floor(Math.random() * 5) - 2;
    global += Math.floor(Math.random() * 5) - 2;

    if (chile < 3) chile = 3;
    if (global < 2) global = 2;

    actualizarTexto();
}

// INICIO
actualizarTexto();
setInterval(variacionSuave, 20000);  // cada 20 seg
setInterval(cambioFuerte, 120000);   // cada 2 min

</script>

</body>
</html>
