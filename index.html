<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Salud Latina</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0d1117, #161b22);
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

.container {
    padding: 20px;
}

h1 {
    font-weight: 400;
    letter-spacing: 1px;
}

.player {
    margin: 25px 0;
}

.oyentes {
    font-size: 12px;
    font-weight: 300;
    color: #c9d1d9;
    margin-top: 8px;
    opacity: 0.85;
}

audio {
    width: 85%;
    max-width: 420px;
    border-radius: 10px;
}

iframe {
    margin-top: 25px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}
</style>

</head>

<body>

<div class="container">

    <h1>🎧 Radio Salud Latina</h1>

    <!-- PLAYER -->
    <div class="player">
        <audio controls autoplay>
            <source src="https://cast6.asurahosting.com/proxy/radio_salud_latina/stream" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>

        <!-- OYENTES -->
        <div class="oyentes" id="oyentes">
            🇨🇱 0 oyentes · 🌎 0 oyentes
        </div>
    </div>

    <!-- PODCAST -->
    <iframe style="border-radius:12px" 
        src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l" 
        width="85%" height="152" frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

</div>

<script>

// 🔥 INICIO MÁS NATURAL (evita números repetidos)
let chile = Math.floor(Math.random() * 12) + 4;
let global = Math.floor(Math.random() * 10) + 3;

// 🕐 PATRÓN REALISTA SEGÚN HORA
function ajustePorHora() {
    let hora = new Date().getHours();

    if (hora >= 6 && hora < 12) {
        chile += 1.5;
        global += 2.5;
    } else if (hora >= 12 && hora < 18) {
        chile += 2.5;
        global += 3;
    } else if (hora >= 18 && hora < 23) {
        chile += 3.5;
        global += 4;
    } else {
        chile -= 1.5;
        global += 3.5; // 🌎 sube en la noche
    }
}

// 🔄 ACTUALIZA VISUAL
function actualizarTexto() {
    document.getElementById("oyentes").innerHTML =
        "🇨🇱 " + Math.floor(chile) + " oyentes · 🌎 " + Math.floor(global) + " oyentes";
}

// 🔁 MICRO VARIACIONES (movimiento constante)
function variacionSuave() {
    chile += (Math.random() - 0.5) * 1.5;
    global += (Math.random() - 0.5) * 1.5;

    if (chile < 3) chile = 3;
    if (global < 2) global = 2;

    actualizarTexto();
}

// 🚀 CAMBIOS MÁS VISIBLES
function cambioFuerte() {
    ajustePorHora();

    chile += Math.floor(Math.random() * 7) - 3;
    global += Math.floor(Math.random() * 7) - 3;

    if (chile < 3) chile = 3;
    if (global < 2) global = 2;

    actualizarTexto();
}

// 🎯 ARRANQUE
actualizarTexto();

// 🔁 INTERVALOS
setInterval(variacionSuave, 15000);   // cada 15 seg
setInterval(cambioFuerte, 90000);     // cada 1.5 min

</script>

</body>
</html>
