<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>En Código Azul</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0B1C2C, #132F4C);
  color: white;
  text-align: center;
}

header {
  padding: 30px;
  font-size: 38px;
  font-weight: bold;
  background: #00AEEF;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 25px;
}

/* PLAYER + AUDIENCIA */
.player-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

audio {
  max-width: 320px;
}

/* AUDIENCIA ESTILO PRO */
.listeners-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.listeners {
  font-size: 13px;
  font-weight: 300;
  color: #A8FFD6;
  background: rgba(0,0,0,0.25);
  padding: 6px 10px;
  border-radius: 12px;
  letter-spacing: 0.5px;
}

/* BARRAS */
.bar {
  display: inline-block;
  width: 5px;
  height: 20px;
  margin: 2px;
  background: #1DB954;
  animation: bounce 1s infinite ease-in-out;
}

.bar:nth-child(2){ animation-delay: 0.2s;}
.bar:nth-child(3){ animation-delay: 0.4s;}
.bar:nth-child(4){ animation-delay: 0.6s;}
.bar:nth-child(5){ animation-delay: 0.8s;}

@keyframes bounce {
  0%,100% {height: 10px;}
  50% {height: 30px;}
}

iframe {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 18px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  font-weight: bold;
}

footer {
  padding: 20px;
  background: #08131F;
  font-size: 14px;
}
</style>
</head>

<body>

<header>🎙️ En Código Azul</header>

<div class="container">

<div class="card">
<h2>📻 En Vivo</h2>

<div>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</div>

<div class="player-container">

  <audio controls autoplay>
    <source src="http://cast6.my-control-panel.com:9253/;stream.mp3" type="audio/mpeg">
  </audio>

  <div class="listeners-group">
    <div class="listeners" id="listeners-chile">
      🇨🇱 Oyentes en línea: --
    </div>
    <div class="listeners" id="listeners-global">
      🌎 Oyentes en línea: --
    </div>
  </div>

</div>

</div>

<div class="card">
<h2>🎧 Podcast En Código Azul</h2>

<iframe 
src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l"
height="352"
frameborder="0"
allow="autoplay; encrypted-media">
</iframe>

</div>

<div class="card">
<h2>📲 Contáctanos</h2>

<a class="btn" href="https://wa.me/56977990671" target="_blank">
📱 WhatsApp: +569 7799 0671
</a>

</div>

</div>

<footer>
© 2026 En Código Azul - Jorge Luis Vergara Salas
</footer>

<script>

const fechaInicio = new Date("2026-03-01");

let chile = 5;
let global = 3;

function crecimientoBase() {
  let hoy = new Date();
  let dias = Math.floor((hoy - fechaInicio) / (1000 * 60 * 60 * 24));
  return Math.min(dias * 0.3, 20);
}

function rangoChile() {
  let h = new Date().getHours();

  if (h >= 0 && h < 6) return [2, 5];
  if (h >= 6 && h < 12) return [4, 10];
  if (h >= 12 && h < 18) return [8, 15];
  if (h >= 18 && h < 23) return [12, 25];
  return [6, 12];
}

function rangoGlobal() {
  let h = new Date().getHours();

  if (h >= 0 && h < 6) return [6, 14];
  if (h >= 6 && h < 12) return [5, 10];
  if (h >= 12 && h < 18) return [4, 9];
  if (h >= 18 && h < 23) return [6, 12];
  return [5, 11];
}

function actualizarAudiencia() {

  let crecimiento = crecimientoBase();

  let [minC, maxC] = rangoChile();
  let [minG, maxG] = rangoGlobal();

  minC += crecimiento;
  maxC += crecimiento;

  minG += crecimiento * 0.8;
  maxG += crecimiento * 0.8;

  chile += Math.floor(Math.random() * 5) - 2;
  global += Math.floor(Math.random() * 5) - 2;

  chile = Math.max(minC, Math.min(maxC, chile));
  global = Math.max(minG, Math.min(maxG, global));

  document.getElementById("listeners-chile").innerText =
    "🇨🇱 Oyentes en línea: " + Math.floor(chile);

  document.getElementById("listeners-global").innerText =
    "🌎 Oyentes en línea: " + Math.floor(global);
}

setInterval(actualizarAudiencia, 120000);
actualizarAudiencia();

</script>

</body>
</html>
