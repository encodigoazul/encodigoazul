<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>En Código Azul</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0B1C2C, #132F4C);
  color: white;
  text-align: center;
}

/* HEADER */
header {
  padding: 30px;
  font-size: 42px;
  font-weight: bold;
  color: white;
  background: #00AEEF;
  white-space: nowrap;
}

/* CONTENEDOR */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* TARJETAS */
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 25px;
}

/* AUDIO */
audio {
  width: 100%;
  margin-top: 10px;
}

/* ANIMACIÓN */
.bar {
  display: inline-block;
  width: 5px;
  height: 20px;
  margin: 2px;
  background: #1DB954;
  animation: bounce 1s infinite ease-in-out;
}

.bar:nth-child(2){ animation-delay: 0.2s;}
.bar:nth-child(3){ animation-delay: 0.4s;}
.bar:nth-child(4){ animation-delay: 0.6s;}
.bar:nth-child(5){ animation-delay: 0.8s;}

@keyframes bounce {
  0%,100% {height: 10px;}
  50% {height: 30px;}
}

/* IFRAME */
iframe {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

/* BOTÓN */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 18px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  font-weight: bold;
}

/* FOOTER */
footer {
  padding: 20px;
  background: #08131F;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
🎙️ En Código Azul
</header>

<div class="container">

<!-- RADIO -->
<div class="card">
<h2>📻 Radio en Vivo</h2>

<div>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</div>

<audio controls autoplay>
  <source src="http://cast6.my-control-panel.com:9253/;stream.mp3" type="audio/mpeg">
</audio>

</div>

<!-- PODCAST -->
<div class="card">
<h2>🎧 Podcast En Código Azul</h2>

<iframe 
src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l"
height="352"
frameborder="0"
allow="autoplay; encrypted-media">
</iframe>

</div>

<!-- CONTACTO -->
<div class="card">
<h2>📲 Contáctanos</h2>

<a class="btn" href="https://wa.me/56977990671" target="_blank">
📱 WhatsApp: +569 7799 0671
</a>

</div>

</div>

<footer>
© 2026 En Código Azul - Jorge Luis Vergara Salas
</footer>

</body>
</html>
