<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>En Código Azul</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0B1C2C, #132F4C);
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      font-size: 34px;
      font-weight: bold;
      background: linear-gradient(90deg, #00AEEF, #0077B6);
      letter-spacing: 1px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 25px;
      border-radius: 18px;
      margin-bottom: 30px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 10px;
    }

    .live {
      color: #7CFFB2;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      border-radius: 14px;
      margin-top: 15px;
    }

    .spotify-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: #1DB954;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
    }

    footer {
      margin-top: 40px;
      padding: 15px;
      background: #08131F;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  🎙️ En Código Azul
</header>

<div class="container">

  <!-- RADIO -->
  <div class="card">
    <h2>📻 Radio en Vivo</h2>
    <div class="live">🔴 EN VIVO</div>

    <audio controls>
      <source src="http://cast6.my-control-panel.com:9253/;stream.mp3" type="audio/mpeg">
      Tu navegador no soporta audio en vivo.
    </audio>
  </div>

  <!-- PODCAST -->
  <div class="card">
    <h2>🎧 Podcast En Código Azul</h2>

    <iframe 
      src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l"
      height="352"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

    <a class="spotify-btn" 
       href="https://open.spotify.com/show/0HUu3XkUTCDn2WqkYugt2l" 
       target="_blank">
       Escuchar en Spotify
    </a>

  </div>

</div>

<footer>
  © 2026 En Código Azul
</footer>

</body>
</html>
