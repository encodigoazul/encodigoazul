<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>En Código Azul</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0B1C2C;
      color: white;
      text-align: center;
    }

    header {
      background: #00AEEF;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .radio-box {
      background: #132F4C;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    button {
      background: #00AEEF;
      border: none;
      padding: 12px 25px;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #008FCC;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #7CFFB2;
    }

    iframe {
      margin-top: 15px;
      border-radius: 12px;
    }

    footer {
      margin-top: 40px;
      padding: 15px;
      background: #08131F;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  🎙️ En Código Azul
</header>

<div class="container">

  <!-- RADIO -->
  <div class="radio-box">
    <h2>🔴 Radio en Vivo</h2>

    <button onclick="mostrarRadio()">▶️ Escuchar Radio</button>

    <div class="status">Haz clic para activar la radio</div>

    <div id="radioPlayer" style="display:none;">
      <iframe 
        src="https://cast6.asurahosting.com/public/radio_salud_latina"
        width="100%" 
        height="180" 
        frameborder="0"
        allow="autoplay">
      </iframe>
    </div>
  </div>

  <!-- PODCAST -->
  <div>
    <h2>🎧 Podcast en Spotify</h2>

    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l"
      width="100%" 
      height="352"
      frameborder="0"
      allowfullscreen
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

  </div>

</div>

<footer>
  © 2026 En Código Azul
</footer>

<script>
function mostrarRadio() {
  document.getElementById("radioPlayer").style.display = "block";
}
</script>

</body>
</html>
