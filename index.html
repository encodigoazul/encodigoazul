<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>En Código Azul</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0B1C2C, #132F4C);
      color: white;
      text-align: center;
    }

    header {
      padding: 25px;
      font-size: 30px;
      font-weight: bold;
      background: #00AEEF;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 30px;
    }

    .player-box {
      background: #132F4C;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
    }

    button {
      background: #00AEEF;
      border: none;
      padding: 12px 25px;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #008FCC;
    }

    iframe {
      border-radius: 12px;
      margin-top: 15px;
    }

    .live {
      color: #7CFFB2;
      font-weight: bold;
      margin-bottom: 10px;
    }

    footer {
      margin-top: 40px;
      padding: 15px;
      background: #08131F;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  🎙️ En Código Azul
</header>

<div class="container">

  <!-- RADIO -->
  <div class="card">
    <h2>📻 Radio en Vivo</h2>

    <div class="player-box">
      <div class="live">🔴 EN VIVO</div>

      <audio id="radio" controls>
        <source src="https://cast6.my-control-panel.com:9253/;stream.mp3" type="audio/mpeg">
      </audio>

      <br>

      <button onclick="activarRadio()">▶️ Activar Radio</button>
    </div>
  </div>

  <!-- PODCAST -->
  <div class="card">
    <h2>🎧 Podcast en Spotify</h2>

    <iframe 
      src="https://open.spotify.com/embed/show/0HUu3XkUTCDn2WqkYugt2l"
      width="100%" 
      height="352"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

</div>

<footer>
  © 2026 En Código Azul
</footer>

<script>
function activarRadio() {
  const radio = document.getElementById("radio");
  radio.play().catch(() => {
    alert("Presiona play directamente en el reproductor.");
  });
}
</script>

</body>
</html>
